<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayurvedic Voice AI</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #F4F9F4;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .chat-container {
            background-color: white;
            width: 100%;
            max-width: 600px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 80vh;
        }

        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        h2 {
            color: #2C5F2D;
            margin: 0;
        }

        .lang-toggle {
            display: flex;
            background: #E8F1E8;
            border-radius: 20px;
            overflow: hidden;
        }

        .lang-toggle input {
            display: none;
        }

        .lang-toggle label {
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
            color: #2C5F2D;
            transition: 0.3s;
        }

        .lang-toggle input:checked+label {
            background: #97BC62;
            color: white;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            border: 1px solid #E8F1E8;
            border-radius: 10px;
            margin-bottom: 20px;
            background-color: #FAFCFA;
        }

        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 80%;
            line-height: 1.5;
        }

        .user-msg {
            background-color: #2C5F2D;
            color: white;
            align-self: flex-end;
            margin-left: auto;
            border-bottom-right-radius: 2px;
        }

        .ai-msg {
            background-color: #E8F1E8;
            color: #333;
            align-self: flex-start;
            margin-right: auto;
            border-bottom-left-radius: 2px;
        }

        /* Fixed the CSS class name here to match your HTML */
        .input-container {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
        }

        button {
            background-color: #97BC62;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background-color: #2C5F2D;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

    <div class="chat-container">
        <div class="header-area">
            <h2>🌿 Ayurvedic AI</h2>

            <div class="lang-toggle">
                <input type="radio" id="lang-en" name="language" value="en" checked>
                <label for="lang-en">English</label>

                <input type="radio" id="lang-hi" name="language" value="hi">
                <label for="lang-hi">हिंदी</label>
            </div>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="message ai-msg">Namaste! Choose your language at the top, then tell me your symptoms or click
                the microphone to speak!</div>
        </div>

        <div class="input-container">
            <input type="text" id="user-input" placeholder="Type your symptoms here..."
                onkeypress="handleKeyPress(event)">

            <button id="mic-btn"
                style="background-color: #ff4757; color: white; border-radius: 50%; border: none; padding: 15px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;">🎙️</button>

            <button id="ask-btn">Ask</button>
        </div>

        <audio id="ai-audio" controls style="display: none;"></audio>
    </div>

    <script>
        // 1. Element References (All IDs match perfectly now!)
        const chatBox = document.getElementById("chatBox");
        const userInput = document.getElementById("user-input");
        const askBtn = document.getElementById("ask-btn");
        const micBtn = document.getElementById("mic-btn");
        const audioPlayer = document.getElementById("ai-audio");

        // Allow hitting "Enter" to send
        function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }
        askBtn.addEventListener('click', sendMessage);

        // 2. SPEECH-TO-TEXT LOGIC
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();

            micBtn.addEventListener('click', () => {
                // Check if Hindi is selected to understand Hindi voice!
                const isHindi = document.getElementById('lang-hi').checked;
                recognition.lang = isHindi ? 'hi-IN' : 'en-US';

                recognition.start();
                micBtn.innerText = "🔴"; // Turn red while listening
            });

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                userInput.value = transcript; // Put words in the box
                micBtn.innerText = "🎙️"; // Reset mic icon

                // Automatically send the message after talking!
                sendMessage();
            };

            recognition.onerror = () => {
                micBtn.innerText = "🎙️"; // Reset if there's an error
            };
        } else {
            micBtn.style.display = "none"; // Hide mic if browser doesn't support it
        }

        // 3. SENDING MESSAGE LOGIC
        // 3. SENDING MESSAGE LOGIC
            async function sendMessage() {
                const text = userInput.value.trim();
                if (!text) return;

                // --- THE AUDIO UNLOCK TRICK ---
                // Play a tiny, silent sound immediately when the button is clicked 
                // so the browser grants us permission to play the real audio later!
                audioPlayer.volume = 0;
                audioPlayer.play().catch(e => { });
                audioPlayer.pause();
                audioPlayer.volume = 1;
                // ------------------------------

                const selectedLang = document.querySelector('input[name="language"]:checked').value;

                // Show User Message
                appendMessage(text, "user-msg");
                userInput.value = "";
                askBtn.disabled = true;
                askBtn.innerText = "...";

                try {
                    const response = await fetch('/ask', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: text, language: selectedLang })
                    });

                    const data = await response.json();

                    // Show AI Answer
                    appendMessage(data.answer, "ai-msg");

                    // Play the real audio!
                    if (data.audio_url) {
                        audioPlayer.src = data.audio_url;
                        audioPlayer.play();
                    }

                } catch (error) {
                    appendMessage("Sorry, the server is offline.", "ai-msg");
                }

                askBtn.disabled = false;
                askBtn.innerText = "Ask";
            }
        // Helper function to draw chat bubbles
        function appendMessage(text, className) {
            const msgDiv = document.createElement("div");
            msgDiv.className = `message ${className}`;
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>

</html>
